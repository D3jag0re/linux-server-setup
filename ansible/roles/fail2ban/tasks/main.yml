---
- name: Install Fail2Ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Configure Fail2Ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban

- name: Ensure Fail2Ban is enabled
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
