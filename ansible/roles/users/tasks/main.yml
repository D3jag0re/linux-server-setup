---
- name: Ensure admin group memberships are present
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: "{{ admin_user_shell }}"
    groups: "{{ admin_user_groups }}"
    append: true
    create_home: "{{ admin_user_create_home }}"
    state: present

- name: Install authorized key for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ lookup('ansible.builtin.file', ssh_public_key_file) if (ssh_public_key_file | length > 0) else ssh_public_key }}"
    state: present
  when: (ssh_public_key | length > 0) or (ssh_public_key_file | length > 0)

- name: Allow passwordless sudo for admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
