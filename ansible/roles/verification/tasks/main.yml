---
- name: Check ssh service state
  ansible.builtin.command: systemctl is-enabled ssh
  register: ssh_enabled
  changed_when: false

- name: Check unattended upgrades service state
  ansible.builtin.command: systemctl is-enabled unattended-upgrades
  register: unattended_enabled
  changed_when: false

- name: Check firewall status
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false

- name: Check Fail2Ban sshd jail
  ansible.builtin.command: fail2ban-client status sshd
  register: fail2ban_sshd_status
  changed_when: false

- name: Gather recent ssh logs
  ansible.builtin.command: journalctl -u ssh -n 20 --no-pager
  register: ssh_journal
  changed_when: false

- name: Render verification checklist
  ansible.builtin.template:
    src: checklist.md.j2
    dest: /tmp/linux-server-checklist.md
    mode: "0644"
