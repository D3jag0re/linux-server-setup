name: Build > Deploy > Config > Verify

on:
  push:
    branches:
      - main
      - feat/ansible-config-pipeline
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.general ansible.posix

      - name: Set backend credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: ./terraform

      - name: Terraform init
        run: terraform init
        working-directory: ./terraform
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ./terraform
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}

      - name: Ansible syntax check
        run: ansible-playbook -i inventories/dev/hosts.yml site.yml --syntax-check
        working-directory: ./ansible

  deploy:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      id: ${{ steps.droplet_outputs.outputs.id }}
      ipv4: ${{ steps.droplet_outputs.outputs.ipv4 }}
      name: ${{ steps.droplet_outputs.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.2

      - name: Set backend credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform init
        run: terraform init
        working-directory: ./terraform
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var "do_token=${{ secrets.DO_TOKEN }}" \
            -var "public_key=${{ secrets.DO_SSH_PUBLIC_KEY_PRIVATE }}"
        working-directory: ./terraform
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}

      - name: Get droplet outputs
        id: droplet_outputs
        run: |
          DROPLET_INFO=$(terraform output -json droplet_info)
          echo "id=$(echo "$DROPLET_INFO" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "ipv4=$(echo "$DROPLET_INFO" | jq -r '.ipv4')" >> "$GITHUB_OUTPUT"
          echo "name=$(echo "$DROPLET_INFO" | jq -r '.name')" >> "$GITHUB_OUTPUT"
        working-directory: ./terraform

  config:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.general ansible.posix

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_PRIVATE_KEY_PRIVATE }}" > ~/.ssh/do_key
          printf '%s\n' "${{ secrets.DO_SSH_PUBLIC_KEY_PRIVATE }}" > ~/.ssh/do_key.pub
          chmod 600 ~/.ssh/do_key
          chmod 644 ~/.ssh/do_key.pub

      - name: Make helper scripts executable
        run: chmod +x scripts/render_inventory.sh

      - name: Run Ansible playbook
        run: |
          ../scripts/render_inventory.sh "${{ needs.deploy.outputs.ipv4 }}" root > inventories/github-actions/hosts.yml
          if ! ansible-playbook \
            -i inventories/github-actions/hosts.yml \
            site.yml \
            --private-key ~/.ssh/do_key \
            -e "ssh_public_key_file=/home/runner/.ssh/do_key.pub"; then
            ../scripts/render_inventory.sh "${{ needs.deploy.outputs.ipv4 }}" doomguy > inventories/github-actions/hosts.yml
            ansible-playbook \
              -i inventories/github-actions/hosts.yml \
              site.yml \
              --private-key ~/.ssh/do_key \
              -e "ssh_public_key_file=/home/runner/.ssh/do_key.pub"
          fi
        working-directory: ./ansible

  verify:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.general ansible.posix

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_PRIVATE_KEY_PRIVATE }}" > ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key

      - name: Make helper scripts executable
        run: chmod +x scripts/render_inventory.sh

      - name: Render verification inventory
        run: ./scripts/render_inventory.sh "${{ needs.deploy.outputs.ipv4 }}" doomguy > ansible/inventories/github-actions/hosts.yml

      - name: Run verification playbook
        run: |
          ansible-playbook \
            -i inventories/github-actions/hosts.yml \
            verify.yml \
            --private-key ~/.ssh/do_key
        working-directory: ./ansible
